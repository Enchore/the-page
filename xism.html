<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<title>思政闯关 · 新时代中国特色社会主义概论</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--red-main:#D4232C;--red-glow:#D4232C66;--gold:#FFD700;--gold-glow:#FFD70044;
--bg:#0A0A12;--bg2:#12121F;--bg3:#1A1A2E;--surface:#16162A;--surface2:#1E1E38;
--text:#E8E8F0;--text2:#9090B0;--green:#00FF88;--red:#FF3366;--cyan:#00E5FF;
--purple:#AA66FF;--orange:#FF6600;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans SC','Fira Code',monospace}
canvas#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .5s}
.screen.active{display:flex;opacity:1}

/* SPLASH */
#splash{background:radial-gradient(ellipse at center,#2a1a1a 0%,#0a0a12 70%);z-index:10000}
.splash-title{font-family:'Noto Sans SC',sans-serif;font-size:clamp(1.8rem,5vw,3.5rem);font-weight:900;background:linear-gradient(135deg,var(--red-main),var(--gold),var(--red-main));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.15em;animation:titlePulse 3s infinite;text-align:center;line-height:1.4}
.splash-sub{font-size:clamp(.75rem,1.8vw,1.1rem);color:var(--text2);margin:.8rem 0 2rem;letter-spacing:.25em;font-weight:300;text-align:center}
.splash-badge{font-size:.7rem;color:var(--gold);border:1px solid var(--gold);padding:.3rem .8rem;border-radius:20px;margin-bottom:1.5rem;letter-spacing:.1em}
@keyframes titlePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.btn{font-family:'Noto Sans SC',sans-serif;font-size:.95rem;padding:.8rem 2.5rem;border:2px solid var(--red-main);background:transparent;color:var(--red-main);cursor:pointer;letter-spacing:.15em;position:relative;overflow:hidden;transition:all .3s;border-radius:4px;z-index:10001;font-weight:700}
.btn:hover{background:var(--red-main);color:#fff;box-shadow:0 0 30px var(--red-glow),inset 0 0 30px #ffffff22}
.btn-cyan{border-color:var(--cyan);color:var(--cyan)}.btn-cyan:hover{background:var(--cyan);color:#000;box-shadow:0 0 30px var(--gold-glow)}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:var(--green);color:#000;box-shadow:0 0 30px #00ff8844}
.btn-gold{border-color:var(--gold);color:var(--gold)}.btn-gold:hover{background:var(--gold);color:#000;box-shadow:0 0 30px var(--gold-glow)}
.btn-sm{font-size:.75rem;padding:.5rem 1.2rem}

/* HUB */
#hub{background:var(--bg)}
.hub-header{position:absolute;top:0;left:0;right:0;padding:1.2rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:20;background:linear-gradient(to bottom,#0a0a12ee,transparent)}
.hub-stats{display:flex;gap:1.5rem;align-items:center;font-size:.85rem}
.stat{display:flex;align-items:center;gap:.4rem}
.stat .val{color:var(--gold);font-weight:700}
.hub-title{font-size:1rem;color:var(--red-main);letter-spacing:.2em;font-weight:900}
.hub-scene{width:100%;height:100%;perspective:1200px;display:flex;align-items:center;justify-content:center}
.hub-ring{position:relative;width:700px;height:700px;transform-style:preserve-3d;transform:rotateX(-15deg) rotateY(0deg);cursor:grab}
.hub-ring.dragging{cursor:grabbing}
@keyframes hubSpin{from{transform:rotateX(-15deg) rotateY(0deg)}to{transform:rotateX(-15deg) rotateY(360deg)}}
.portal{position:absolute;width:140px;height:160px;left:50%;top:50%;cursor:pointer;transform-style:preserve-3d;transition:opacity .3s, filter .3s}
.portal:hover .portal-inner{transform:scale(1.08)}
.portal-inner{width:100%;height:100%;background:var(--surface);border:1px solid #ffffff15;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;gap:.5rem;position:relative;overflow:hidden;backdrop-filter:blur(8px);transition:transform .3s}
.portal-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red-main)}
.portal.locked .portal-inner{opacity:.4;filter:grayscale(.8)}
.portal.locked .portal-inner::before{background:var(--text2)}
.portal-icon{font-size:2rem;filter:drop-shadow(0 0 10px var(--red-glow))}
.portal-name{font-size:.75rem;font-weight:700;text-align:center;color:var(--text)}
.portal-stars{display:flex;gap:2px;font-size:.75rem}
.portal-stars .star{color:#333}
.portal-stars .star.earned{color:var(--gold)}
.portal .lock-icon{position:absolute;font-size:1.5rem;color:var(--text2)}
.portal:not(.locked) .portal-inner{animation:glowPulse 3s infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 5px var(--red-glow)}50%{box-shadow:0 0 20px var(--red-glow),0 0 40px #D4232C22}}
.portal.locked .portal-inner::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 5px,#ffffff03 5px,#ffffff03 10px)}

/* GAME SCREENS */
.game-screen{background:var(--bg);flex-direction:column}
.game-header{width:100%;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid #ffffff0a;flex-shrink:0}
.game-header-left{display:flex;align-items:center;gap:1rem}
.back-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.3rem;padding:.3rem;transition:color .2s}
.back-btn:hover{color:var(--red-main)}
.game-title{font-size:.9rem;color:var(--red-main);letter-spacing:.15em;font-weight:700}
.game-header-right{display:flex;gap:1.5rem;align-items:center;font-size:.8rem}
.game-score{color:var(--gold)}.game-lives{color:var(--red)}.game-timer{color:var(--cyan)}
.game-body{flex:1;width:100%;overflow:auto;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative}
.game-footer{width:100%;padding:.8rem 1.5rem;display:flex;justify-content:center;gap:1rem;background:var(--surface);border-top:1px solid #ffffff0a;flex-shrink:0}

/* MEMORY CARDS */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:750px;width:100%}
.mem-card{aspect-ratio:3/4;perspective:800px;cursor:pointer}
.mem-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.mem-card.flipped .mem-card-inner,.mem-card.matched .mem-card-inner{transform:rotateY(180deg)}
.mem-card-front,.mem-card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:.7rem;text-align:center}
.mem-card-front{background:linear-gradient(145deg,var(--surface),var(--surface2));border:1px solid var(--red-main)}
.mem-card-front::after{content:'☆';font-size:2rem;opacity:.3;color:var(--red-main)}
.mem-card-back{transform:rotateY(180deg);border:1px solid #ffffff22}
.mem-card-back.type-term{background:linear-gradient(145deg,#2a1a1a,#1f0d0d);border-color:var(--red-main);font-size:clamp(.6rem,1.3vw,.85rem);color:var(--gold);font-weight:700;line-height:1.4}
.mem-card-back.type-def{background:linear-gradient(145deg,#1a1a2e,#0d1a2a);border-color:var(--cyan);font-size:clamp(.55rem,1.2vw,.75rem);color:var(--text);line-height:1.4}
.mem-card.matched{opacity:.5;pointer-events:none}
.mem-card.matched .mem-card-inner{transform:rotateY(180deg) scale(.95)}

/* CHOICE QUESTIONS */
.choice-wrap{max-width:700px;width:100%}
.choice-question{background:var(--surface);border-left:3px solid var(--red-main);padding:1rem 1.2rem;margin-bottom:1rem;border-radius:0 8px 8px 0;font-size:.9rem;color:var(--text);line-height:1.6}
.choice-options{display:flex;flex-direction:column;gap:.6rem}
.choice-opt{padding:.8rem 1rem;background:var(--surface);border:1px solid #ffffff15;border-radius:8px;cursor:pointer;transition:all .2s;font-size:.85rem;line-height:1.5;display:flex;align-items:flex-start;gap:.6rem}
.choice-opt:hover{border-color:var(--red-main);background:var(--surface2)}
.choice-opt .opt-label{color:var(--red-main);font-weight:700;flex-shrink:0}
.choice-opt.correct{border-color:var(--green);background:#00ff8815}
.choice-opt.wrong{border-color:var(--red);background:#ff336615}

/* FILL BLANKS */
.fill-wrap{max-width:750px;width:100%}
.fill-desc{background:var(--surface);border-left:3px solid var(--purple);padding:1rem;margin-bottom:1rem;border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text2);line-height:1.5}
.fill-passage{background:#0d0d1a;border:1px solid #ffffff10;border-radius:8px;padding:1.2rem;font-size:.9rem;line-height:2;color:var(--text)}
.fill-blank{display:inline-block;min-width:80px;border-bottom:2px dashed var(--red-main);padding:2px 6px;margin:0 2px;background:var(--bg2);font-size:.85rem;color:var(--gold);outline:none;text-align:center;transition:all .2s;border-radius:3px 3px 0 0}
.fill-blank:focus{border-bottom-color:var(--cyan);background:var(--bg3)}
.fill-blank.correct{border-bottom-color:var(--green);color:var(--green);background:#00ff8810}
.fill-blank.wrong{border-bottom-color:var(--red);color:var(--red);background:#ff336610}

/* TIMELINE / CODE BUILDER (reused for sorting) */
.sort-wrap{display:flex;gap:2rem;width:100%;max-width:800px;flex-wrap:wrap;justify-content:center}
.sort-task{width:100%;background:var(--surface);border:1px solid var(--red-main);border-radius:8px;padding:1rem 1.2rem;margin-bottom:.5rem}
.sort-task-label{font-size:.7rem;color:var(--red-main);letter-spacing:.15em;margin-bottom:.4rem;font-weight:700}
.sort-task-desc{font-size:.9rem;line-height:1.5;color:var(--text)}
.sort-dropzone{flex:1;min-width:300px;min-height:200px;background:var(--surface);border:2px dashed #ffffff15;border-radius:8px;padding:.8rem;display:flex;flex-direction:column;gap:6px;transition:border-color .2s}
.sort-dropzone.over{border-color:var(--red-main)}
.sort-source{flex:1;min-width:250px;display:flex;flex-direction:column;gap:6px;padding:.8rem}
.sort-block{font-size:.8rem;padding:.7rem 1rem;background:var(--bg3);border:1px solid #ffffff15;border-radius:6px;cursor:grab;user-select:none;transition:all .2s;color:var(--text);line-height:1.4}
.sort-block:hover{border-color:var(--red-main);background:var(--surface2)}
.sort-block.dragging{opacity:.4;transform:scale(.95)}
.sort-block.correct{border-color:var(--green);background:#00ff8810}
.sort-block.wrong{border-color:var(--red);background:#ff336610;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ERROR CORRECTION (Bug Hunter style) */
.errcorr-wrap{max-width:750px;width:100%}
.ec-desc{background:var(--surface);border-left:3px solid var(--red);padding:1rem;margin-bottom:1rem;border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text2);line-height:1.5}
.ec-editor{background:#0d0d1a;border:1px solid #ffffff10;border-radius:8px;overflow:hidden}
.ec-editor-header{background:var(--surface);padding:.5rem 1rem;display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--text2)}
.ec-editor-header .dot{width:8px;height:8px;border-radius:50%}
.ec-line{display:flex;align-items:flex-start;padding:.4rem .8rem;cursor:pointer;transition:background .15s;border-left:3px solid transparent;font-size:.85rem;line-height:1.6}
.ec-line:hover{background:#ffffff06}
.ec-line.selected{background:#ff336615;border-left-color:var(--red)}
.ec-line.correct-bug{background:#00ff8815;border-left-color:var(--green)}
.ec-line.missed-bug{background:#ff660020;border-left-color:var(--orange)}

/* MAZE */
.maze-container{width:100%;height:100%;position:relative;overflow:hidden}
.maze-viewport{width:100%;height:100%;perspective:600px;display:flex;align-items:center;justify-content:center}
.maze-grid-wrap{transform-style:preserve-3d;transform:rotateX(55deg) rotateZ(0deg);transition:transform .3s}
.maze-grid{display:grid;gap:0;position:relative}
.maze-cell{width:40px;height:40px;position:relative;border:1px solid #ffffff08}
.maze-cell.wall{background:linear-gradient(145deg,#1a1a2e,#0d0d1a);border-color:#ffffff04;box-shadow:inset 0 0 10px #00000066}
.maze-cell.path{background:#12122044}
.maze-cell.player{background:var(--red-main);box-shadow:0 0 20px var(--red-glow);border-radius:4px;z-index:5}
.maze-cell.question-cell{background:#D4232C15;border-color:var(--red-main);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--red-main);animation:glowPulse 2s infinite}
.maze-cell.exit{background:var(--gold);box-shadow:0 0 20px var(--gold-glow);border-radius:4px}
.maze-cell.visited{background:#D4232C08}
.maze-question-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10000;background:var(--surface);border:2px solid var(--red-main);border-radius:12px;padding:1.5rem;max-width:500px;width:90%;box-shadow:0 0 60px #00000088,0 0 0 9999px #00000088}
.maze-question-popup h3{font-size:.85rem;color:var(--red-main);margin-bottom:.8rem;font-weight:700}
.maze-question-popup .mq-options{display:flex;flex-direction:column;gap:.5rem}
.maze-question-popup .mq-opt{padding:.6rem .8rem;background:var(--bg2);border:1px solid #ffffff15;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .15s;line-height:1.5}
.maze-question-popup .mq-opt:hover{border-color:var(--red-main)}

/* EXAM SCREEN */
.exam-wrap{max-width:750px;width:100%}
.exam-progress{width:100%;height:4px;background:var(--bg3);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.exam-progress-bar{height:100%;background:linear-gradient(90deg,var(--red-main),var(--gold));transition:width .3s;border-radius:2px}
.exam-result-card{background:var(--surface);border:2px solid var(--gold);border-radius:16px;padding:2rem;text-align:center;max-width:500px;width:100%}
.exam-pass{border-color:var(--green);background:linear-gradient(145deg,#0a1f0a,#0d1a0d)}
.exam-fail{border-color:var(--red);background:linear-gradient(145deg,#1f0a0a,#1a0d0d)}
.exam-score-big{font-size:3rem;font-weight:900;margin:.5rem 0}
.exam-label{font-size:.8rem;color:var(--text2);margin-bottom:.3rem}

/* MODE PICKER */
.mode-picker-overlay{position:fixed;inset:0;z-index:10001;background:#000000cc;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mode-picker-overlay.active{opacity:1;pointer-events:auto}
.mode-picker-box{background:var(--surface);border:2px solid var(--red-main);border-radius:16px;padding:2rem;max-width:400px;width:90%;text-align:center}
.mode-picker-title{font-size:1.1rem;color:var(--red-main);margin-bottom:.3rem;font-weight:900}
.mode-picker-sub{font-size:.8rem;color:var(--text2);margin-bottom:1.5rem}
.mode-picker-btns{display:flex;flex-direction:column;gap:.8rem}
.mode-pick-btn{padding:1rem;background:var(--bg2);border:1px solid #ffffff15;border-radius:10px;cursor:pointer;transition:all .2s;text-align:left}
.mode-pick-btn:hover{border-color:var(--cyan);background:var(--bg3)}
.mode-pick-btn .mpb-title{font-size:.85rem;margin-bottom:.2rem;font-weight:700}
.mode-pick-btn .mpb-desc{font-size:.7rem;color:var(--text2);line-height:1.4}
.mode-pick-btn.pick-normal .mpb-title{color:var(--cyan)}
.mode-pick-btn.pick-endless .mpb-title{color:var(--gold)}
.mode-pick-back{margin-top:1rem;font-size:.75rem;color:var(--text2);cursor:pointer;border:none;background:none;font-family:inherit}
.mode-pick-back:hover{color:var(--text)}

/* RESULT OVERLAY */
.result-overlay{position:fixed;inset:0;z-index:80;background:#0a0a12ee;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;backdrop-filter:blur(10px)}
.result-overlay.active{display:flex}
.result-stars{font-size:3rem;display:flex;gap:.5rem}
.result-stars .star{color:#333;transition:all .3s}
.result-stars .star.earned{color:var(--gold);text-shadow:0 0 20px #ffd70066;animation:starPop .5s cubic-bezier(.17,.67,.29,1.53)}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}100%{transform:scale(1) rotate(0)}}
.result-score{font-size:2rem;color:var(--red-main);font-weight:900}
.result-msg{font-size:1rem;color:var(--text2);text-align:center;max-width:400px}

/* PARTICLES */
.particle{position:fixed;pointer-events:none;z-index:90;border-radius:50%;animation:particleFly 1s forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--red-main)}

/* SCANLINE */
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none !important;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00000008 2px,#00000008 4px);opacity:.3}

/* MOBILE CONTROLS */
.mobile-controls{position:absolute;bottom:1.5rem;right:1.5rem;display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(3,50px);gap:4px;z-index:30}
.mobile-controls button{background:var(--surface);border:1px solid var(--red-main);color:var(--red-main);font-size:1.2rem;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.7;transition:all .15s}
.mobile-controls button:active{background:var(--red-main);color:#fff;opacity:1}
@media(min-width:769px){.mobile-controls{display:grid;opacity:.5}.mobile-controls:hover{opacity:1}}

/* RESPONSIVE */
@media(max-width:768px){
  .hub-ring{width:500px;height:500px}.portal{width:100px;height:120px}.portal-icon{font-size:1.5rem}.portal-name{font-size:.65rem}
  .memory-grid{grid-template-columns:repeat(4,1fr);gap:8px;max-width:500px}
  .sort-wrap{flex-direction:column}
}
@media(max-width:500px){
  .hub-ring{width:360px;height:360px}.portal{width:80px;height:95px}.portal-icon{font-size:1.2rem}.portal-name{font-size:.55rem}
  .memory-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="splash-badge">2025 思政复习神器</div>
  <div class="splash-title">习近平新时代<br>中国特色社会主义思想</div>
  <div class="splash-sub">概 论 · 闯 关 冒 险</div>
  <button class="btn" onclick="startGame()">启 动 学 习 系 统</button>
</div>

<!-- HUB -->
<div id="hub" class="screen">
  <div class="hub-header">
    <div class="hub-title">&#9733; 学习大厅 &#9733;</div>
    <div class="hub-stats">
      <div class="stat"><span>&#9733;</span><span class="val" id="totalStars">0</span><span>/30</span></div>
      <div class="stat"><span>&#9670;</span><span class="val" id="totalScore">0</span></div>
    </div>
  </div>
  <div class="hub-scene"><div class="hub-ring" id="hubRing"></div></div>
</div>

<!-- GAME SCREENS -->
<div id="gameMemory" class="screen game-screen"></div>
<div id="gameChoice" class="screen game-screen"></div>
<div id="gameFill" class="screen game-screen"></div>
<div id="gameTimeline" class="screen game-screen"></div>
<div id="gameError" class="screen game-screen"></div>
<div id="gameConnect" class="screen game-screen"></div>
<div id="gameMaze" class="screen game-screen"></div>
<div id="gameKeyword" class="screen game-screen"></div>
<div id="gameJudge" class="screen game-screen"></div>
<div id="gameExam" class="screen game-screen"></div>

<!-- MODE PICKER -->
<div class="mode-picker-overlay" id="modePicker"></div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-stars" id="resultStars"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-msg" id="resultMsg"></div>
  <div style="display:flex;gap:1rem;margin-top:1rem">
    <button class="btn btn-sm" onclick="goHub()">返回大厅</button>
    <button class="btn btn-sm btn-cyan" onclick="replayMode()">再来一次</button>
  </div>
</div>

<script>
// ===================== AUDIO ENGINE =====================
const AudioEngine={ctx:null,init(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},play(type){try{if(!this.ctx)this.init();if(!this.ctx)return;const c=this.ctx,now=c.currentTime;if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);const presets={click:{f:800,d:.08,t:'sine'},correct:{f:523,d:.15,t:'sine',f2:659},wrong:{f:200,d:.2,t:'sawtooth'},flip:{f:1200,d:.06,t:'sine'},star:{f:880,d:.3,t:'sine',f2:1318},type:{f:600+Math.random()*400,d:.03,t:'square'},complete:{f:523,d:.5,t:'sine'}};const p=presets[type]||presets.click;o.type=p.t;o.frequency.setValueAtTime(p.f,now);if(p.f2)o.frequency.linearRampToValueAtTime(p.f2,now+p.d);g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+p.d);o.start(now);o.stop(now+p.d)}catch(e){}}};

// ===================== BACKGROUND PARTICLES =====================
const bgCanvas=document.getElementById('bgCanvas');const bgCtx=bgCanvas.getContext('2d');let bgParticles=[];
function initBg(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;bgParticles=Array.from({length:80},()=>({x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,a:Math.random()*.5+.1}))}
function drawBg(){bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);bgParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=bgCanvas.width;if(p.x>bgCanvas.width)p.x=0;if(p.y<0)p.y=bgCanvas.height;if(p.y>bgCanvas.height)p.y=0;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);bgCtx.fillStyle=`rgba(212,35,44,${p.a})`;bgCtx.fill()});for(let i=0;i<bgParticles.length;i++){for(let j=i+1;j<bgParticles.length;j++){const dx=bgParticles[i].x-bgParticles[j].x;const dy=bgParticles[i].y-bgParticles[j].y;const d=Math.sqrt(dx*dx+dy*dy);if(d<120){bgCtx.beginPath();bgCtx.moveTo(bgParticles[i].x,bgParticles[i].y);bgCtx.lineTo(bgParticles[j].x,bgParticles[j].y);bgCtx.strokeStyle=`rgba(212,35,44,${.05*(1-d/120)})`;bgCtx.stroke()}}}requestAnimationFrame(drawBg)}
initBg();drawBg();window.addEventListener('resize',initBg);

// ===================== CELEBRATION PARTICLES =====================
function spawnParticles(x,y,color='#D4232C',count=12){for(let i=0;i<count;i++){const p=document.createElement('div');p.className='particle';const angle=(Math.PI*2/count)*i;const dist=40+Math.random()*60;p.style.cssText=`left:${x}px;top:${y}px;width:6px;height:6px;background:${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px`;document.body.appendChild(p);setTimeout(()=>p.remove(),1000)}}

// ===================== STATE MANAGEMENT =====================
let state={totalScore:0,stars:{memory:0,choice:0,fill:0,timeline:0,error:0,connect:0,maze:0,keyword:0,judge:0,exam:0},unlocked:['memory','choice','fill','judge'],currentMode:null,examPassed:false};
function saveState(){localStorage.setItem('xism_adventure_v1',JSON.stringify(state));const se=document.getElementById('totalStars');const sc=document.getElementById('totalScore');if(se)se.textContent=Object.values(state.stars).reduce((a,b)=>a+b,0);if(sc)sc.textContent=state.totalScore}
function loadState(){const s=localStorage.getItem('xism_adventure_v1');if(s){try{Object.assign(state,JSON.parse(s))}catch(e){}}checkUnlocks();saveState()}
function checkUnlocks(){const t=Object.values(state.stars).reduce((a,b)=>a+b,0);if(!state.unlocked.includes('choice'))state.unlocked.push('choice');if(!state.unlocked.includes('fill'))state.unlocked.push('fill');if(!state.unlocked.includes('judge'))state.unlocked.push('judge');if(t>=2&&!state.unlocked.includes('timeline'))state.unlocked.push('timeline');if(t>=3&&!state.unlocked.includes('error'))state.unlocked.push('error');if(t>=4&&!state.unlocked.includes('connect'))state.unlocked.push('connect');if(t>=5&&!state.unlocked.includes('keyword'))state.unlocked.push('keyword');if(t>=6&&!state.unlocked.includes('maze'))state.unlocked.push('maze');if(t>=8&&!state.unlocked.includes('exam'))state.unlocked.push('exam')}

// ===================== SCREEN MANAGEMENT =====================
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function startGame(){AudioEngine.init();AudioEngine.play('click');showScreen('hub');loadState();buildHub()}
function goHub(){AudioEngine.play('click');state.currentMode=null;document.getElementById('resultOverlay').classList.remove('active');checkUnlocks();saveState();buildHub();showScreen('hub')}
let lastMode=null;function replayMode(){AudioEngine.play('click');document.getElementById('resultOverlay').classList.remove('active');if(lastMode)launchMode(lastMode)}
function showResult(modeId,score,maxScore){const pct=score/maxScore;const stars=pct>=.9?3:pct>=.6?2:pct>=.3?1:0;if(stars>state.stars[modeId])state.stars[modeId]=stars;state.totalScore+=score;saveState();const msgs=['继续努力！加油！','初窥门径，继续深入！','融会贯通！','大师级表现！'];document.getElementById('resultStars').innerHTML=[0,1,2].map((s,i)=>`<span class="star${i<stars?' earned':''}" style="animation-delay:${i*.2}s">${i<stars?'★':'☆'}</span>`).join('');document.getElementById('resultScore').textContent=`${score} / ${maxScore}`;document.getElementById('resultMsg').textContent=msgs[stars];setTimeout(()=>{document.getElementById('resultOverlay').classList.add('active');if(stars>0)AudioEngine.play('star')},300)}
function makeGameHeader(title,screenId,extraHtml=''){return `<div class="game-header"><div class="game-header-left"><button class="back-btn" onclick="goHub()">◂</button><div class="game-title">${title}</div></div><div class="game-header-right">${extraHtml}</div></div>`}

function buildHub(){const ring=document.getElementById('hubRing');ring.innerHTML='';const n=modes.length;const radius=Math.min(window.innerWidth,window.innerHeight)*.28;modes.forEach((m,i)=>{const angle=(2*Math.PI/n)*i-Math.PI/2;const x=Math.cos(angle)*radius;const z=Math.sin(angle)*radius;const portal=document.createElement('div');const locked=!state.unlocked.includes(m.id);const unlockReqs={timeline:2,error:3,connect:4,keyword:5,maze:6,exam:8};const reqText=unlockReqs[m.id]?`需要 ${unlockReqs[m.id]} 颗星解锁`:'';portal.className=`portal${locked?' locked':''}`;portal.style.transform=`translate(-50%,-50%) translateX(${x}px) translateZ(${z}px)`;portal.dataset.baseAngle=((360/n)*i).toString();portal.dataset.posX=x.toString();portal.dataset.posZ=z.toString();const stars=[0,1,2].map(s=>`<span class="star${s<state.stars[m.id]?' earned':''}">★</span>`).join('');portal.innerHTML=`<div class="portal-inner"><div class="portal-icon">${m.icon}</div><div class="portal-name">${m.name}</div><div class="portal-stars">${stars}</div>${locked?`<div class="lock-icon">🔒</div><div style="position:absolute;bottom:6px;font-size:.5rem;color:var(--text2)">${reqText}</div>`:''}</div>`;if(!locked)portal.addEventListener('click',()=>{AudioEngine.play('click');launchMode(m.id)});ring.appendChild(portal)})}
function launchMode(id){lastMode=id;state.currentMode=id;doLaunchMode(id)}
function doLaunchMode(id){switch(id){case'memory':initMemory();break;case'choice':initChoice();break;case'fill':initFill();break;case'timeline':initTimeline();break;case'error':initError();break;case'connect':initConnect();break;case'maze':initMaze();break;case'keyword':initKeyword();break;case'judge':initJudge();break;case'exam':initExam();break}}

function initMemory(){

  pairs.forEach(p=>{cards.push({type:'term',text:p.term,pairId:p.term});cards.push({type:'def',text:p.def,pairId:p.term})});
  cards=shuffle(cards);
  let flipped=[],matched=0,flips=0,score=0;const maxPairs=pairs.length;
  screen.innerHTML=makeGameHeader('核心概念配对','gameMemory',`<span class="game-score">配对: <span id="memMatched">0</span>/${maxPairs}</span><span class="game-timer">翻牌: <span id="memFlips">0</span></span>`)+`<div class="game-body"><div class="memory-grid" id="memGrid"></div></div>`;
  const grid=document.getElementById('memGrid');
  cards.forEach((c,i)=>{const card=document.createElement('div');card.className='mem-card';card.dataset.idx=i;card.innerHTML=`<div class="mem-card-inner"><div class="mem-card-front"></div><div class="mem-card-back type-${c.type}">${escHtml(c.text)}</div></div>`;
    card.addEventListener('click',()=>{if(flipped.length>=2||card.classList.contains('flipped')||card.classList.contains('matched'))return;AudioEngine.play('flip');card.classList.add('flipped');flipped.push({el:card,data:c});flips++;document.getElementById('memFlips').textContent=flips;
      if(flipped.length===2){setTimeout(()=>{if(flipped[0].data.pairId===flipped[1].data.pairId&&flipped[0].data.type!==flipped[1].data.type){flipped.forEach(f=>f.el.classList.add('matched'));AudioEngine.play('correct');matched++;score+=Math.max(10,30-flips);const rect=flipped[0].el.getBoundingClientRect();spawnParticles(rect.left+rect.width/2,rect.top+rect.height/2,'#00FF88');document.getElementById('memMatched').textContent=matched;if(matched===maxPairs)setTimeout(()=>showResult('memory',score,maxPairs*30),600)}else{AudioEngine.play('wrong');flipped.forEach(f=>f.el.classList.remove('flipped'))}flipped=[]},800)}});grid.appendChild(card)});
  showScreen('gameMemory');
}

function initMaze(){
  const screen=document.getElementById('gameMaze');const mazeW=13,mazeH=13;const maze=generateMaze(mazeW,mazeH);
  let playerPos={x:1,y:1};const exitPos={x:mazeW-2,y:mazeH-2};let score=0,questionActive=false,visited=new Set();visited.add(`${playerPos.x},${playerPos.y}`);
  const questionCells=new Set();const questions=shuffle([...mazeQData]).slice(0,5);let qIdx=0;
  const pathCells=[];for(let y=0;y<mazeH;y++)for(let x=0;x<mazeW;x++){if(maze[y][x]===0&&!(x===1&&y===1)&&!(x===exitPos.x&&y===exitPos.y))pathCells.push({x,y})}
  shuffle(pathCells).slice(0,questions.length).forEach(c=>questionCells.add(`${c.x},${c.y}`));
  function renderMaze(){
    screen.innerHTML=makeGameHeader('思想迷宫','gameMaze',`<span class="game-score">得分: ${score}</span><span style="color:var(--green);font-size:.8rem">WASD / 方向键移动</span>`)+`<div class="game-body"><div class="maze-container"><div class="maze-viewport"><div class="maze-grid-wrap"><div class="maze-grid" id="mazeGrid" style="grid-template-columns:repeat(${mazeW},40px)"></div></div></div><div class="mobile-controls"><div></div><button onclick="window._mazeMove(0,-1)">▲</button><div></div><button onclick="window._mazeMove(-1,0)">◀</button><div></div><button onclick="window._mazeMove(1,0)">▶</button><div></div><button onclick="window._mazeMove(0,1)">▼</button><div></div></div></div></div>`;
    const grid=document.getElementById('mazeGrid');
    for(let y=0;y<mazeH;y++)for(let x=0;x<mazeW;x++){const cell=document.createElement('div');let cls='maze-cell';if(maze[y][x]===1)cls+=' wall';else cls+=' path';if(x===playerPos.x&&y===playerPos.y)cls+=' player';if(x===exitPos.x&&y===exitPos.y)cls+=' exit';if(visited.has(`${x},${y}`)&&maze[y][x]===0)cls+=' visited';if(questionCells.has(`${x},${y}`)){cls+=' question-cell';cell.textContent='?'}cell.className=cls;grid.appendChild(cell)}
    showScreen('gameMaze');
  }
  window._mazeMove=(dx,dy)=>movePlayer(dx,dy);
  function movePlayer(dx,dy){if(questionActive)return;const nx=playerPos.x+dx,ny=playerPos.y+dy;if(nx<0||ny<0||nx>=mazeW||ny>=mazeH||maze[ny][nx]===1)return;playerPos={x:nx,y:ny};visited.add(`${nx},${ny}`);AudioEngine.play('click');

    const key=`${nx},${ny}`;if(questionCells.has(key)&&qIdx<questions.length){questionCells.delete(key);showMazeQ(questions[qIdx++])}}
  function showMazeQ(q){questionActive=true;const popup=document.createElement('div');popup.className='maze-question-popup';popup.innerHTML=`<h3>&#9733; 知识关卡 &#9733;</h3><div style="font-size:.85rem;color:var(--text);margin-bottom:1rem;line-height:1.5">${escHtml(q.q)}</div><div class="mq-options">${q.options.map((o,i)=>`<div class="mq-opt" data-i="${i}">${escHtml(o)}</div>`).join('')}</div><div class="mq-explain" style="display:none;margin-top:.8rem;padding:.6rem;background:#D4232C15;border-left:3px solid var(--red-main);border-radius:0 6px 6px 0;font-size:.75rem;color:var(--text);line-height:1.5"></div><div style="text-align:center;margin-top:.8rem"><button class="btn btn-sm btn-cyan" style="display:none" id="mqContinue">继续探索 ▸</button></div>`;
    document.body.appendChild(popup);const explainEl=popup.querySelector('.mq-explain');const continueBtn=popup.querySelector('#mqContinue');
    popup.querySelectorAll('.mq-opt').forEach(opt=>{opt.addEventListener('click',()=>{popup.querySelectorAll('.mq-opt').forEach(o=>o.style.pointerEvents='none');const correct=+opt.dataset.i===q.correct;
        if(correct){AudioEngine.play('correct');score+=15;opt.style.borderColor='var(--green)';opt.style.background='#00ff8820'}else{AudioEngine.play('wrong');opt.style.borderColor='var(--red)';opt.style.background='#ff336620';popup.querySelectorAll('.mq-opt')[q.correct].style.borderColor='var(--green)';popup.querySelectorAll('.mq-opt')[q.correct].style.background='#00ff8810'}
        if(q.exp){explainEl.textContent='💡 '+q.exp;explainEl.style.display='block'}continueBtn.style.display='inline-block';continueBtn.addEventListener('click',()=>{AudioEngine.play('click');popup.remove();questionActive=false;renderMaze()})})});
  }
  function handleKey(e){if(state.currentMode!=='maze'){document.removeEventListener('keydown',handleKey);return}const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};if(map[e.key]){e.preventDefault();movePlayer(...map[e.key])}}
  document.addEventListener('keydown',handleKey);renderMaze();
}
function generateMaze(w,h){const grid=Array.from({length:h},()=>Array(w).fill(1));function carve(x,y){grid[y][x]=0;const dirs=shuffle([[0,-2],[0,2],[-2,0],[2,0]]);for(const[dx,dy]of dirs){const nx=x+dx,ny=y+dy;if(nx>0&&ny>0&&nx<w-1&&ny<h-1&&grid[ny][nx]===1){grid[y+dy/2][x+dx/2]=0;carve(nx,ny)}}}carve(1,1);grid[h-2][w-2]=0;if(grid[h-3][w-2]===1&&grid[h-2][w-3]===1)grid[h-3][w-2]=0;return grid}

      bodyHtml=`<div class="choice-question">${currentQ+1}/${totalQ}. ${escHtml(ch.q)}</div><div class="choice-options" id="examOpts">${ch.opts.map((o,i)=>`<div class="choice-opt" data-i="${i}"><span class="opt-label">${labels[i]}.</span><span>${escHtml(o)}</span></div>`).join('')}</div>`;
    }else if(ch.type==='judge'){
      bodyHtml=`<div class="choice-question" style="line-height:1.7">${currentQ+1}/${totalQ}. 判断正误：${escHtml(ch.stmt)}</div><div style="display:flex;gap:1rem;justify-content:center;margin-top:1rem" id="examOpts"><button class="btn btn-green exam-judge-btn" data-v="true" style="min-width:120px">✓ 正确</button><button class="btn exam-judge-btn" data-v="false" style="min-width:120px;border-color:var(--red);color:var(--red)">✗ 错误</button></div>`;
    }else if(ch.type==='maze'){
      bodyHtml=`<div class="choice-question">${currentQ+1}/${totalQ}. ${escHtml(ch.q)}</div><div class="choice-options" id="examOpts">${ch.options.map((o,i)=>`<div class="choice-opt" data-i="${i}"><span class="opt-label">${['A','B','C','D'][i]}.</span><span>${escHtml(o)}</span></div>`).join('')}</div>`;
    }
    screen.innerHTML=makeGameHeader('期末模拟考试','gameExam',`<span class="game-score">得分: ${score}/${currentQ}</span><span class="game-timer">及格线: ${passScore}分</span>`)+`<div class="game-body"><div class="exam-wrap"><div class="exam-progress"><div class="exam-progress-bar" style="width:${pct}%"></div></div>${bodyHtml}<div id="examArea" style="margin-top:1rem"></div></div></div>`;
    const area=document.getElementById('examArea');
    if(ch.type==='choice'){
      document.querySelectorAll('#examOpts .choice-opt').forEach(opt=>{opt.addEventListener('click',()=>{document.querySelectorAll('#examOpts .choice-opt').forEach(el=>el.style.pointerEvents='none');const i=+opt.dataset.i;
          if(i===ch.ans){opt.classList.add('correct');score++;AudioEngine.play('correct')}else{opt.classList.add('wrong');AudioEngine.play('wrong');document.querySelectorAll('#examOpts .choice-opt')[ch.ans].classList.add('correct')}
          if(ch.exp)addExpToArea(area,ch.exp);addExamNext(area)})});
    }else if(ch.type==='judge'){
      document.querySelectorAll('.exam-judge-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.exam-judge-btn').forEach(b=>b.disabled=true);
          const userTrue=(btn.dataset.v==='true');const correct=(userTrue===ch.correct);
          if(correct){score++;AudioEngine.play('correct');btn.style.boxShadow='0 0 20px #00ff8844'}else{AudioEngine.play('wrong');btn.style.boxShadow='0 0 20px #ff336644'}
          if(ch.exp)addExpToArea(area,ch.exp);addExamNext(area)})});
    }else if(ch.type==='maze'){
      document.querySelectorAll('#examOpts .choice-opt').forEach(opt=>{opt.addEventListener('click',()=>{document.querySelectorAll('#examOpts .choice-opt').forEach(el=>el.style.pointerEvents='none');const i=+opt.dataset.i;
          if(i===ch.correct){opt.classList.add('correct');score++;AudioEngine.play('correct')}else{opt.classList.add('wrong');AudioEngine.play('wrong');document.querySelectorAll('#examOpts .choice-opt')[ch.correct].classList.add('correct')}
          if(ch.exp)addExpToArea(area,ch.exp);addExamNext(area)})});
    }
    showScreen('gameExam');
  }
  function addExpToArea(area,text){const exp=document.createElement('div');exp.style.cssText='padding:.6rem;background:#D4232C15;border-left:3px solid var(--red-main);border-radius:0 6px 6px 0;font-size:.75rem;color:var(--text);line-height:1.5';exp.textContent='💡 '+text;area.appendChild(exp)}
  function addExamNext(area){const isLast=currentQ+1>=totalQ;const nextBtn=document.createElement('button');nextBtn.className='btn btn-sm btn-cyan';nextBtn.style.marginTop='.6rem';nextBtn.textContent=isLast?'查看考试结果':'下一题 ▸';nextBtn.addEventListener('click',()=>{AudioEngine.play('click');currentQ++;if(currentQ<totalQ)renderExam();else showExamResult()});area.appendChild(nextBtn)}
  function showExamResult(){
    const passed=score>=passScore;const pct=Math.round(score/totalQ*100);
    if(passed){state.examPassed=true;state.stars.exam=pct>=90?3:pct>=75?2:1;state.totalScore+=score*2;saveState()}
    screen.innerHTML=makeGameHeader('考试结果','gameExam','')+`<div class="game-body"><div class="exam-result-card ${passed?'exam-pass':'exam-fail'}"><div style="font-size:3rem;margin-bottom:.5rem">${passed?'🎓':'📚'}</div><div class="exam-label">最终得分</div><div class="exam-score-big" style="color:${passed?'var(--green)':'var(--red)'}">${score} / ${totalQ}</div><div style="font-size:1.2rem;margin:.5rem 0;color:${passed?'var(--gold)':'var(--text2)'}">${pct}分 · 正确率 ${pct}%</div><div style="font-size:.9rem;margin:.8rem 0;padding:.8rem;border-radius:8px;${passed?'background:#00ff8815;color:var(--green)':'background:#ff336615;color:var(--red)'}">及格线：${Math.round(passScore/totalQ*100)}分（${passScore}/${totalQ}题）</div><div style="font-size:1.5rem;font-weight:900;margin:.5rem 0;color:${passed?'var(--gold)':'var(--red)'}"> ${passed?'🎉 恭喜通过！预测考试合格！':'😤 未通过，继续复习！'}</div>${passed?`<div style="font-size:.8rem;color:var(--text2);margin-top:.5rem">按照当前掌握程度，考试通过概率约 <span style="color:var(--gold);font-weight:700">${Math.min(99,pct+Math.floor(Math.random()*10))}%</span></div>`:`<div style="font-size:.8rem;color:var(--text2);margin-top:.5rem">建议回到各关卡继续复习薄弱环节，再来挑战！</div>`}<div style="display:flex;gap:1rem;margin-top:1.5rem;justify-content:center"><button class="btn btn-sm" onclick="goHub()">返回大厅</button><button class="btn btn-sm btn-cyan" onclick="initExam()">重新考试</button></div></div></div>`;
    showScreen('gameExam');
    if(passed){AudioEngine.play('star');spawnParticles(window.innerWidth/2,window.innerHeight/3,'#FFD700',30)}
  }
  renderExam();
}
// ===================== HUB RING DRAG ROTATION =====================
(function(){
  const ring=document.getElementById('hubRing');
  let currentAngle=0,targetAngle=0,velocity=0;
  let isDragging=false,startX=0,dragStartAngle=0;
  const friction=0.95,autoSpeed=0.15,sensitivity=0.4;
  let autoRotate=true,autoTimer=null,rafId=null;
  let autoDirection=1,lastDragDir=0;
  let touchMoved=false,touchStartTarget=null;

  function setAngle(deg){
    currentAngle=deg;
    ring.style.transform=`rotateX(-15deg) rotateY(${deg}deg)`;
    const portals=ring.querySelectorAll('.portal');
    portals.forEach(p=>{
      const px=p.dataset.posX, pz=p.dataset.posZ;
      if(px!==undefined){
        p.style.transform=`translate(-50%,-50%) translateX(${px}px) translateZ(${pz}px) rotateY(${-deg}deg)`;
      }
    });
  }

  function animate(){
    if(!isDragging){
      if(autoRotate){
        currentAngle+=autoSpeed*autoDirection;
        setAngle(currentAngle);
      }else{
        velocity*=friction;
        if(Math.abs(velocity)<0.05){autoDirection=lastDragDir||autoDirection;velocity=0;autoRotate=true;}
        currentAngle+=velocity;
        setAngle(currentAngle);
      }
    }
    rafId=requestAnimationFrame(animate);
  }

  function getX(e){
    if(e.touches&&e.touches.length)return e.touches[0].clientX;
    return e.clientX;
  }

  function onStart(e){
    isDragging=true;
    autoRotate=false;
    clearTimeout(autoTimer);
    startX=getX(e);
    dragStartAngle=currentAngle;
    velocity=0;
    touchMoved=false;
    touchStartTarget=e.target;
    ring.classList.add('dragging');
    if(e.type==='mousedown') e.preventDefault();
  }

  function onMove(e){
    if(!isDragging)return;
    const dx=getX(e)-startX;
    if(Math.abs(dx)>8) touchMoved=true;
    const newAngle=dragStartAngle+dx*sensitivity;
    velocity=newAngle-currentAngle;
    if(Math.abs(velocity)>0.01)lastDragDir=velocity>0?1:-1;
    currentAngle=newAngle;
    setAngle(currentAngle);
    if(touchMoved) e.preventDefault();
  }

  function onEnd(e){
    if(!isDragging)return;
    isDragging=false;
    ring.classList.remove('dragging');
    if(!touchMoved && e.type==='touchend' && touchStartTarget){
      const portal=touchStartTarget.closest('.portal');
      if(portal && !portal.classList.contains('locked')){
        e.preventDefault();
        portal.click();
        return;
      }
    }
    autoTimer=setTimeout(()=>{autoRotate=true;},4000);
  }

  ring.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onEnd);
  ring.addEventListener('touchstart',onStart,{passive:false});
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('touchend',onEnd);

  animate();
})();

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function levenshtein(a,b){const m=a.length,n=b.length;const d=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){const cost=a[i-1]===b[j-1]?0:1;d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+cost)}return d[m][n]}
